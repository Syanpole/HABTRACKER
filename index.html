<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker Export Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-mesh"></div>
  <section id="loginGate" class="auth-shell">
    <div class="panel auth-card">
      <p class="eyebrow">Secure Access</p>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in before accessing your habit and wellness workspace.</p>
      <div class="field-group">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" type="text" maxlength="40" placeholder="your name" autocomplete="username" />
      </div>
      <div class="field-group">
        <label for="loginPin">PIN / Password</label>
        <input id="loginPin" type="password" maxlength="40" placeholder="enter password" autocomplete="current-password" />
      </div>
      <div class="actions">
        <button id="loginBtn" class="btn btn-primary" type="button">Enter Workspace</button>
      </div>
      <p id="loginStatus" class="db-status" data-tone="neutral" role="status" aria-live="polite">
        First login creates your local account.
      </p>
    </div>
  </section>

  <main id="appShell" class="app-shell hidden">
    <header class="hero">
      <p class="eyebrow">Monthly Routine Control</p>
      <h1>Habit Tracker Export Studio</h1>
      <p class="subtitle">Track daily actions, notes, money, training, and nutrition in one place.</p>
    </header>

    <nav class="panel app-navbar" aria-label="Main Navigation">
      <section class="tab-switcher" aria-label="Main Tabs">
        <button class="tab-btn is-active" data-tab="habit" type="button">Habit tracker</button>
        <button class="tab-btn" data-tab="journal" type="button">Journal</button>
        <button class="tab-btn" data-tab="finances" type="button">Finances</button>
        <button class="tab-btn" data-tab="exercise" type="button">Exercise</button>
        <button class="tab-btn" data-tab="food" type="button">Food</button>
      </section>
      <div class="app-navbar-actions">
        <button id="logoutBtn" class="btn btn-ghost" type="button">Logout</button>
      </div>
    </nav>

    <section class="tab-panel is-active" data-tab-panel="habit"></section>

    <section class="tab-panel" data-tab-panel="journal"></section>

    <section class="tab-panel" data-tab-panel="finances"></section>

    <section class="tab-panel" data-tab-panel="exercise"></section>

    <section class="tab-panel" data-tab-panel="food"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
