name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - ci-cd

jobs:
  ci-build:
    name: CI Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.0.4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  cd-artifact:
    name: CD Artifact Package
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.0.4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
