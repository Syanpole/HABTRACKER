<section class="panel">
  <h2>Finances Tracker</h2>
  <div class="grid-two">
    <div class="field-group">
      <label for="financeDateInput">Date</label>
      <input id="financeDateInput" type="date" />
    </div>
    <div class="field-group">
      <label for="financeTypeInput">Type</label>
      <select id="financeTypeInput">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
    </div>
    <div class="field-group">
      <label for="financeCategoryInput">Category</label>
      <input id="financeCategoryInput" type="text" maxlength="40" placeholder="Groceries, Salary..." />
    </div>
    <div class="field-group">
      <label for="financeAmountInput">Amount</label>
      <input id="financeAmountInput" type="number" step="0.01" min="0" placeholder="0.00" />
    </div>
  </div>
  <div class="field-group">
    <label for="financeNoteInput">Note</label>
    <input id="financeNoteInput" type="text" maxlength="120" placeholder="Optional note" />
  </div>
  <div class="actions">
    <button id="financeAddBtn" class="btn btn-primary" type="button">Add Transaction</button>
  </div>
</section>
<section class="panel">
  <div class="stats-grid">
    <article class="stat-card">
      <h3>Total Income</h3>
      <p id="financeIncomeStat">0.00</p>
    </article>
    <article class="stat-card">
      <h3>Total Expense</h3>
      <p id="financeExpenseStat">0.00</p>
    </article>
    <article class="stat-card">
      <h3>Balance</h3>
      <p id="financeBalanceStat">0.00</p>
    </article>
  </div>
  <div class="table-scroller compact-scroll">
    <table class="simple-table" id="financeTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Note</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="financeTableBody"></tbody>
    </table>
  </div>
</section>
