<section class="panel">
  <h2>Exercise / Workout</h2>
  <div class="grid-two">
    <div class="field-group">
      <label for="workoutDateInput">Date</label>
      <input id="workoutDateInput" type="date" />
    </div>
    <div class="field-group">
      <label for="workoutLocationInput">Location</label>
      <select id="workoutLocationInput">
        <option value="gym" selected>Gym</option>
        <option value="home">Home workout</option>
      </select>
    </div>
    <div class="field-group">
      <label for="workoutModeInput">Mode</label>
      <select id="workoutModeInput">
        <option value="log" selected>Log workout</option>
        <option value="start">Start workout</option>
      </select>
    </div>
    <div class="field-group">
      <label for="workoutIntensityInput">Intensity</label>
      <select id="workoutIntensityInput">
        <option value="light">Light</option>
        <option value="moderate" selected>Moderate</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="field-group">
      <label for="workoutWeightInput">Body Weight (kg)</label>
      <input id="workoutWeightInput" type="number" min="20" step="0.1" placeholder="70" />
    </div>
    <div class="field-group">
      <label for="workoutDurationInput">Duration (min)</label>
      <input id="workoutDurationInput" type="number" min="1" step="1" placeholder="45" />
    </div>
    <article class="stat-card inline-stat">
      <h3>Estimated Burn</h3>
      <p id="workoutCaloriesPreview">0 kcal</p>
    </article>
  </div>

  <div class="workout-builder">
    <div class="workout-builder-head">
      <h3>Exercise Order</h3>
      <button id="workoutAddItemBtn" class="btn btn-ghost" type="button">Add Exercise</button>
    </div>
    <div id="workoutItemsContainer" class="workout-items"></div>
  </div>

  <div id="workoutSessionActions" class="actions session-actions hidden">
    <button id="workoutStartBtn" class="btn btn-secondary" type="button">Start Workout</button>
    <button id="workoutFinishBtn" class="btn btn-ghost" type="button" disabled>Finish Workout</button>
    <p id="workoutSessionStatus" class="db-status" data-tone="neutral" role="status" aria-live="polite">Session timer is ready.</p>
  </div>

  <div class="actions">
    <button id="workoutSaveBtn" class="btn btn-primary" type="button">Save Workout Log</button>
  </div>
</section>
<section class="panel">
  <div class="stats-grid">
    <article class="stat-card">
      <h3>Total Minutes</h3>
      <p id="workoutMinutesStat">0</p>
    </article>
    <article class="stat-card">
      <h3>Total Calories Burned</h3>
      <p id="workoutCaloriesStat">0</p>
    </article>
  </div>
  <div class="table-scroller compact-scroll">
    <table class="simple-table" id="workoutTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Location</th>
          <th>Mode</th>
          <th>Routine</th>
          <th>Duration</th>
          <th>Calories</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="workoutTableBody"></tbody>
    </table>
  </div>
</section>
